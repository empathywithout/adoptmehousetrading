<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trade Listing — AdoptMeHouseTrading.com</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="site-nav">
  <div class="wrap">
    <a class="brand" href="../index.html">
      <span class="sign-mark"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect x="46" y="30" width="8" height="60" rx="2" fill="#7A5230"/><g transform="rotate(-6 50 40)"><rect x="20" y="18" width="60" height="34" rx="6" fill="#E63A63"/><text x="50" y="34" text-anchor="middle" font-family="Baloo 2, sans-serif" font-weight="700" font-size="11" fill="#FFFFFF">FOR</text><text x="50" y="47" text-anchor="middle" font-family="Baloo 2, sans-serif" font-weight="700" font-size="11" fill="#FFFFFF">TRADE</text></g></svg></span>
      AdoptMeHouseTrading
    </a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="../houses/index.html">Browse Houses</a>
      <a href="index.html" class="active">Trade Listings</a>
      <a href="../comps.html">Recent Trades</a>
      <a href="../list-a-house.html">List a House</a>
      <a href="../profile.html">My Profile</a>
    </nav>
  </div>
</header>

<section class="wrap" id="content" style="padding: 40px 0 80px;"></section>

<footer class="site-footer">
  <div class="wrap">
    AdoptMeHouseTrading.com is a fan-made resource for Roblox's Adopt Me! house trading community. Not affiliated with Adopt Me or Roblox Corporation.
    <div style="margin-top:8px;"><a href="../rules.html" style="color:var(--sign-red);">Community Rules</a></div>
    <div style="margin-top:8px;">
      <a href="#" id="report-link" style="color:var(--sign-red);">Report this listing</a>
      <span id="report-form" hidden>
        <select id="report-reason" style="width:auto;display:inline-block;margin:0 6px;">
          <option value="crosstrading">Crosstrading (Robux/real money/outside Adopt Me)</option>
          <option value="proxy_trading">Proxy trading (not the actual owner)</option>
          <option value="misrepresented_clone">Misrepresented original/cloned status</option>
          <option value="scam_or_no_show">Scam or no-show</option>
          <option value="other">Other</option>
        </select>
        <button class="btn-sm decline" id="report-submit">Submit</button>
      </span>
    </div>
  </div>
</footer>

<script type="module">
  import { api, getStoredProfile, CATEGORY_LABELS } from "../js/api.js";
  import { mountItemPicker } from "../js/item-picker.js";

  const params = new URLSearchParams(location.search);
  const listingId = params.get("id");
  const content = document.getElementById("content");
  const myProfile = getStoredProfile();

  if (!listingId) {
    content.innerHTML = `<div class="form-card"><h1>Listing not found</h1></div>`;
  } else {
    await loadListing();
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function itemsRowHtml(items) {
    return (items || [])
      .map((it) => `<div class="item"><img src="${it.image}" alt=""><div>${escapeHtml(it.name)}</div></div>`)
      .join("");
  }

  async function loadListing() {
    let data;
    try {
      data = await fetch(`/.netlify/functions/listings-get?id=${listingId}`).then((r) => r.json());
    } catch {
      content.innerHTML = `<div class="form-card"><h1>Couldn't load this listing</h1></div>`;
      return;
    }

    if (data.error) {
      content.innerHTML = `<div class="form-card"><h1>${escapeHtml(data.error)}</h1></div>`;
      return;
    }

    const { listing, offers } = data;
    const houses = await fetch("../data/houses.json").then((r) => r.json());
    const house = listing.house_id ? houses.find((h) => h.id === listing.house_id) : null;
    const isOwner = myProfile && myProfile.id === listing.profile_id;

    const TYPE_LABELS = { house_trade: "For Trade", looking_for: "Looking For", commission: "Commission" };

    const photosHtml = (listing.photos?.length ? listing.photos : house ? [house.image] : [])
      .filter(Boolean)
      .map((url) => `<img src="${url}" alt="" style="width:100%;border-radius:10px;margin-bottom:10px;">`)
      .join("");

    const lookingForHtml = (listing.looking_for || [])
      .map((c) => `<span class="pill">${CATEGORY_LABELS[c] || c}</span>`)
      .join("");

    const cloneTag =
      listing.listing_type === "house_trade" && listing.is_cloned !== null
        ? `<span class="pill">${listing.is_cloned ? "Cloned / Speedbuild" : "100% Original"}</span>`
        : "";
    const valueTag =
      listing.value_amount !== null
        ? `<span class="pill">${listing.value_amount} ${listing.value_unit || ""}</span>`
        : "";
    const bucksTag = listing.bucks_invested ? `<span class="pill">${listing.bucks_invested} Bucks invested</span>` : "";

    const includedItemsHtml = listing.included_items?.length
      ? `<div class="section-head" style="margin-top:20px;"><h2 style="font-size:18px;">Included with the house</h2></div>
         <div class="items-row">${itemsRowHtml(listing.included_items)}</div>`
      : "";

    content.innerHTML = `
      <div class="house-detail">
        <div class="photo" style="flex-direction:column;align-items:stretch;">${photosHtml || `<p class="hint">No photos on this listing.</p>`}</div>
        <div>
          <span class="status-badge ${listing.status}">${listing.status === "traded" ? "Traded" : TYPE_LABELS[listing.listing_type] || "For Trade"}</span>
          <h1 style="margin-top:8px;">${escapeHtml(listing.title)}</h1>
          <div class="profile-chip" style="margin: 10px 0 16px;">
            <img src="${listing.profiles?.rbx_avatar_url || "../images/brand/searchdog.png"}" alt="">
            <span class="name">${escapeHtml(listing.profiles?.rbx_username || "unknown")}</span>
          </div>
          <p>${escapeHtml(listing.description || "No description provided.")}</p>
          <div class="meta-row">
            ${house ? `<span class="pill">House: ${escapeHtml(house.name)}</span>` : ""}
            ${cloneTag}${valueTag}${bucksTag}
            ${lookingForHtml ? `<span class="pill">${listing.listing_type === "looking_for" ? "Offering:" : "Looking for:"}</span>${lookingForHtml}` : ""}
          </div>
          ${includedItemsHtml}
        </div>
      </div>

      <div class="section-head"><h2>${listing.listing_type === "commission" ? "Requests" : "Offers"} (${offers.length})</h2></div>
      <div id="offers-list"></div>

      ${
        listing.status === "active" && !isOwner
          ? `<div class="form-card" id="offer-form-card"><h1>${listing.listing_type === "commission" ? "Request a Commission" : listing.listing_type === "looking_for" ? "I Have This House" : "Make an Offer"}</h1>
              <div id="offer-error" class="error-box" hidden></div>
              <div id="offer-success" class="success-box" hidden></div>
              <div id="need-profile-offer" class="hint" hidden>
                <a href="../profile.html">Set up your profile</a> to respond.
              </div>
              <div id="offer-builder">
                ${
                  listing.listing_type === "house_trade"
                    ? `<label class="field-label">Add items to your offer</label>`
                    : `<label class="field-label">Add items (optional)</label>`
                }
                <div class="item-picker">
                  <div class="category-tabs" id="category-tabs"></div>
                  <input type="search" id="item-search" placeholder="Search items..." style="margin-bottom:10px;">
                  <div class="results" id="item-results"></div>
                </div>
                <div class="selected-items" id="selected-items"></div>
                <label class="field-label" for="offer-message">Message${listing.listing_type === "house_trade" ? " (optional)" : ""}</label>
                <textarea id="offer-message" placeholder="${
                  listing.listing_type === "commission"
                    ? "Describe the house you want built..."
                    : listing.listing_type === "looking_for"
                    ? "Let them know you have this house and what you'd want for it"
                    : "Anything you want the lister to know"
                }"></textarea>
                <div class="hero-ctas" style="justify-content:flex-start;margin-top:18px;">
                  <button class="btn btn-primary" id="submit-offer-btn">${listing.listing_type === "commission" ? "Send Request" : "Submit Offer"}</button>
                </div>
              </div>
            </div>`
          : ""
      }
    `;

    renderOffers(offers, isOwner, listing);

    if (listing.status === "active" && !isOwner) {
      if (!myProfile) {
        document.getElementById("offer-builder").hidden = true;
        document.getElementById("need-profile-offer").hidden = false;
      } else {
        initOfferBuilder(listing);
      }
    }

    document.getElementById("report-link").addEventListener("click", (e) => {
      e.preventDefault();
      document.getElementById("report-form").hidden = false;
      e.target.hidden = true;
    });

    document.getElementById("report-submit").addEventListener("click", async () => {
      const reason = document.getElementById("report-reason").value;
      await api.report(listing.id, reason, "");
      document.getElementById("report-form").outerHTML = "<span class='hint'>Thanks — flagged for review.</span>";
    });
  }

  function renderOffers(offers, isOwner, listing) {
    const list = document.getElementById("offers-list");
    if (!offers.length) {
      list.innerHTML = `<p class="hint">No offers yet.</p>`;
      return;
    }

    list.innerHTML = offers
      .map((offer) => {
        const canRespond = isOwner && listing.status === "active" && offer.status === "pending";
        const isCounterparty =
          myProfile && (myProfile.id === listing.profile_id || myProfile.id === offer.offering_profile_id);
        const showConfirm = offer.status === "accepted" && isCounterparty;

        return `
        <div class="offer-card">
          <div class="profile-chip">
            <img src="${offer.profiles?.rbx_avatar_url || "../images/brand/searchdog.png"}" alt="">
            <span class="name">${escapeHtml(offer.profiles?.rbx_username || "unknown")}</span>
          </div>
          <div class="items-row">${itemsRowHtml(offer.items)}</div>
          ${offer.message ? `<p>${escapeHtml(offer.message)}</p>` : ""}
          <span class="status-badge ${offer.status === "accepted" ? "active" : "traded"}">${offer.status}</span>
          ${
            canRespond
              ? `<div class="offer-actions">
                  <button class="btn-sm accept" data-offer="${offer.id}" data-action="accept">Accept</button>
                  <button class="btn-sm decline" data-offer="${offer.id}" data-action="decline">Decline</button>
                </div>`
              : ""
          }
          ${showConfirm ? `<div class="trade-confirm" data-offer="${offer.id}"></div>` : ""}
        </div>`;
      })
      .join("");

    list.querySelectorAll("button[data-offer]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        try {
          await api.respondToOffer(btn.dataset.offer, btn.dataset.action);
          await loadListing();
        } catch (err) {
          alert(err.message);
        }
      });
    });

    list.querySelectorAll(".trade-confirm").forEach((el) => renderTradeConfirm(el, el.dataset.offer));
  }

  async function renderTradeConfirm(el, offerId) {
    let trade;
    try {
      trade = await api.getTrade(offerId);
    } catch {
      trade = null;
    }

    if (trade?.status === "corroborated") {
      el.innerHTML = `<p class="hint">✓ Both sides confirmed this trade happened.</p>`;
      return;
    }

    const myConfirmed = trade && myProfile && (
      (trade.lister_confirmed && trade.__isLister) || (trade.offerer_confirmed && !trade.__isLister)
    );

    el.innerHTML = `
      <div style="margin-top:10px;">
        ${
          myConfirmed
            ? `<p class="hint">You've confirmed this trade. Waiting on the other side.</p>`
            : `<button class="btn-sm accept" data-confirm="${offerId}">Confirm this trade happened</button>
               <p class="hint">Optional: attach a screenshot as proof — helps build a real trade-value history for the community.</p>`
        }
      </div>`;

    const btn = el.querySelector("[data-confirm]");
    if (btn) {
      btn.addEventListener("click", async () => {
        try {
          await api.confirmTrade(offerId);
          await renderTradeConfirm(el, offerId);
        } catch (err) {
          alert(err.message);
        }
      });
    }
  }

  function initOfferBuilder(listing) {
    const picker = mountItemPicker(document.getElementById("offer-builder"), "");

    document.getElementById("submit-offer-btn").addEventListener("click", async () => {
      const errorBox = document.getElementById("offer-error");
      const successBox = document.getElementById("offer-success");
      errorBox.hidden = true;
      successBox.hidden = true;

      const selected = picker.getSelected();
      const message = document.getElementById("offer-message").value.trim();

      if (listing.listing_type === "house_trade" && !selected.length) {
        errorBox.textContent = "Add at least one item to your offer.";
        errorBox.hidden = false;
        return;
      }
      if (listing.listing_type !== "house_trade" && !selected.length && !message) {
        errorBox.textContent = "Add an item or a message.";
        errorBox.hidden = false;
        return;
      }

      try {
        await api.createOffer({ listing_id: listing.id, items: selected, message });
        successBox.textContent = "Offer sent!";
        successBox.hidden = false;
        await loadListing();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.hidden = false;
      }
    });
  }
</script>
</body>
</html>
