<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trade Listing — AdoptMeHouseTrading.com</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="site-nav">
  <div class="wrap">
    <a class="brand" href="../index.html">
      <span class="signpost-mini"></span>
      AdoptMeHouseTrading
    </a>
    <nav>
      <a href="../listings/index.html" class="active">Browse Houses</a>
      <a href="../commissions/index.html">Commissions</a>
      <a href="../registry/index.html">Build Registry</a>
      <a href="../comps.html">Recent Trades</a>
      <a href="../houses/index.html">Values</a>
      <a href="../profile.html">Profile</a>
    </nav>
    <div class="nav-actions">
      <span id="nav-profile-pill"></span>
      <a class="btn btn-primary" href="../list-a-house.html" style="padding:10px 20px;font-size:14px;">Add Listing</a>
    </div>
  </div>
</header>
<script type="module" src="../js/nav.js"></script>

<section class="wrap" id="content" style="padding: 40px 0 80px;"></section>

<footer class="site-footer">
  <div class="wrap">
    AdoptMeHouseTrading.com is a fan-made resource for Roblox's Adopt Me! house trading community. Not affiliated with Adopt Me or Roblox Corporation.
    <div style="margin-top:8px;"><a href="../rules.html" style="color:var(--sign-red);">Community Rules</a></div>
    <div style="margin-top:8px;">
      <a href="#" id="report-link" style="color:var(--sign-red);">Report this listing</a>
      <span id="report-form" hidden>
        <select id="report-reason" style="width:auto;display:inline-block;margin:0 6px;">
          <option value="crosstrading">Crosstrading (Robux/real money/outside Adopt Me)</option>
          <option value="proxy_trading">Proxy trading (not the actual owner)</option>
          <option value="misrepresented_clone">Misrepresented original/cloned status</option>
          <option value="scam_or_no_show">Scam or no-show</option>
          <option value="other">Other</option>
        </select>
        <button class="btn-sm decline" id="report-submit">Submit</button>
      </span>
    </div>
  </div>
</footer>

<script type="module">
  import { api, getStoredProfile, CATEGORY_LABELS, THEME_LABELS, QUICK_REPLIES } from "../js/api.js";
  import { mountChatPanel } from "../js/chat.js";
  import { mountItemPicker } from "../js/item-picker.js";

  const params = new URLSearchParams(location.search);
  const listingId = params.get("id");
  const content = document.getElementById("content");
  const myProfile = getStoredProfile();

  if (!listingId) {
    content.innerHTML = `<div class="form-card"><h1>Listing not found</h1></div>`;
  } else {
    await loadListing();
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function timeAgo(iso) {
    const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
    if (days < 1) return "today";
    if (days === 1) return "yesterday";
    return `${days} days ago`;
  }

  function itemsRowHtml(items) {
    return (items || [])
      .map((it) => `<div class="item"><img src="${it.image}" alt="">${it.qty > 1 ? `<span class="qty">×${it.qty}</span>` : ""}<div>${escapeHtml(it.name)}</div></div>`)
      .join("");
  }

  async function loadListing() {
    let data;
    try {
      data = await fetch(`/.netlify/functions/listings-get?id=${listingId}`).then((r) => r.json());
    } catch {
      content.innerHTML = `<div class="form-card"><h1>Couldn't load this listing</h1></div>`;
      return;
    }

    if (data.error) {
      content.innerHTML = `<div class="form-card"><h1>${escapeHtml(data.error)}</h1></div>`;
      return;
    }

    const { listing, offers } = data;
    const houses = await fetch("../data/houses.json").then((r) => r.json());
    const house = listing.house_id ? houses.find((h) => h.id === listing.house_id) : null;
    const isOwner = myProfile && myProfile.id === listing.profile_id;

    const TYPE_LABELS = { house_trade: "For Trade", looking_for: "Looking For", commission: "Commission" };

    const photos = (listing.photos?.length ? listing.photos : house ? [house.image] : []).filter(Boolean);
    const photosHtml = photos.length
      ? photos.map((url) => `<img src="${url}" alt="" style="width:100%;border-radius:10px;margin-bottom:10px;">`).join("")
      : `<p class="hint">No photos on this listing.</p>`;

    const cloneTag =
      listing.listing_type === "house_trade" && listing.is_cloned !== null
        ? `<span class="pill">${listing.is_cloned ? "Cloned / Speedbuild" : "100% Original"}</span>`
        : "";

    const lookingForHtml = (listing.looking_for || [])
      .map((c) => `<span class="pill">${CATEGORY_LABELS[c] || c}</span>`)
      .join("");

    const themeHtml = (listing.themes || [])
      .map((t) => `<span class="pill">${THEME_LABELS[t] || t}${t === "franchise_crossover" && listing.theme_note ? `: ${escapeHtml(listing.theme_note)}` : ""}</span>`)
      .join("");

    content.innerHTML = `
      <div class="breadcrumb">Browse Houses &nbsp;/&nbsp; <span class="current">${escapeHtml(listing.title)}</span></div>

      <div class="detail-grid">
        <div>
          <div style="margin-bottom:6px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="card-badge ${{house_trade:"house-trade",looking_for:"looking-for",commission:"commission"}[listing.listing_type] || "house-trade"}" style="position:static;">
                <div class="${{house_trade:"icon-sign",looking_for:"icon-loop",commission:"icon-hammer"}[listing.listing_type] || "icon-sign"}"></div>
              </div>
              <h1 style="margin:0;">${escapeHtml(listing.title)}</h1>
              ${cloneTag}
            </div>
          </div>
          <div class="hint" style="margin-bottom:20px;">${listing.status === "traded" ? "Traded" : "Listed " + timeAgo(listing.created_at)} · ${TYPE_LABELS[listing.listing_type] || "For Trade"}</div>

          <div>${photosHtml}</div>

          ${
            listing.description
              ? `<p style="margin-top:16px;">${escapeHtml(listing.description)}</p>`
              : ""
          }

          <div class="meta-row" style="margin-top:12px;">
            ${house ? `<span class="pill">House: ${escapeHtml(house.name)}</span>` : ""}
            ${lookingForHtml ? `<span class="pill">${listing.listing_type === "looking_for" ? "Offering:" : "Looking for:"}</span>${lookingForHtml}` : ""}
            ${themeHtml}
          </div>

          <div class="detail-tabs" style="margin-top:24px;">
            <button class="tab active" data-tab="offers">${listing.listing_type === "commission" ? "Requests" : "Offers"} (${offers.length})</button>
            <button class="tab" data-tab="items">Included Items ${listing.included_items?.length ? `(${listing.included_items.length})` : ""}</button>
          </div>
          <div id="tab-offers"></div>
          <div id="tab-items" hidden>
            ${
              listing.included_items?.length
                ? `<div class="items-row">${itemsRowHtml(listing.included_items)}</div>`
                : `<p class="hint">Nothing extra included with this listing.</p>`
            }
          </div>
        </div>

        <div class="sidebar-sticky">
          <div class="trust-card">
            <img class="avatar-lg" src="${listing.profiles?.rbx_avatar_url || ""}" alt="" onerror="this.removeAttribute('src')">
            <div>
              <div class="trust-name-row">
                <span class="name">${escapeHtml(listing.profiles?.display_name || "unknown")}</span>
                <span style="width:6px;height:6px;border-radius:50%;background:var(--good);"></span>
              </div>
              <div class="trust-sub">${listing.profiles?.rbx_username ? `Lister · Roblox: ${escapeHtml(listing.profiles.rbx_username)}` : "Lister"}</div>
            </div>
          </div>

          <div class="stat-grid-card">
            <div>
              <div class="stat-label">Value</div>
              <div class="stat-value accent">${
                listing.value_amount !== null && listing.value_amount !== undefined
                  ? `${listing.value_amount} <span class="unit">${listing.value_unit || ""}</span>`
                  : `<span class="unit" style="font-size:15px;">Not yet valued</span>`
              }</div>
            </div>
            <div>
              <div class="stat-label">Bucks Invested</div>
              <div class="stat-value">${listing.bucks_invested ? listing.bucks_invested : `<span class="unit" style="font-size:15px;">—</span>`}</div>
            </div>
            ${
              listing.listing_type === "house_trade" && listing.is_cloned !== null
                ? `<div class="full-row">
                    <span style="font-size:12.5px;color:var(--ink-soft);font-weight:600;">Clone Status</span>
                    <span class="pill" style="margin:0;">${listing.is_cloned ? "Cloned" : "Original"}</span>
                  </div>`
                : ""
            }
          </div>

          ${
            listing.status === "active" && !isOwner
              ? `<div class="cta-box" id="offer-cta">
                  <h3>${listing.listing_type === "commission" ? "Request a Commission" : listing.listing_type === "looking_for" ? "I Have This House" : "Make an Offer"}</h3>
                  <p>${
                    listing.listing_type === "commission"
                      ? "Describe the house you'd like built and what you'll pay for it."
                      : listing.listing_type === "looking_for"
                      ? "Let them know you own this house and what you'd want in return."
                      : "Build an offer from Pets, Vehicles, Toys and more to trade for this house."
                  }</p>
                  <button class="btn btn-primary" id="scroll-to-offer-btn">${listing.listing_type === "commission" ? "Send a Request" : "Make an Offer"}</button>
                </div>`
              : ""
          }
        </div>
      </div>

      ${
        listing.status === "active" && !isOwner
          ? `<div class="form-card" id="offer-form-card" style="margin-top:32px;"><h1>${listing.listing_type === "commission" ? "Request a Commission" : listing.listing_type === "looking_for" ? "I Have This House" : "Make an Offer"}</h1>
              <div id="offer-error" class="error-box" hidden></div>
              <div id="offer-success" class="success-box" hidden></div>
              <div id="need-profile-offer" class="hint" hidden>
                <a href="../profile.html">Set up your profile</a> to respond.
              </div>
              <div id="offer-builder">
                ${
                  listing.listing_type === "house_trade"
                    ? `<label class="field-label">Add items to your offer</label>`
                    : `<label class="field-label">Add items (optional)</label>`
                }
                <div class="item-picker">
                  <div class="category-tabs" id="category-tabs"></div>
                  <input type="search" id="item-search" placeholder="Search items..." style="margin-bottom:10px;">
                  <div class="results" id="item-results"></div>
                </div>
                <div class="selected-items" id="selected-items"></div>
                <label class="field-label" for="offer-message">Message${listing.listing_type === "house_trade" ? " (optional)" : ""}</label>
                <div class="quick-replies" id="offer-quick-replies"></div>
                <textarea id="offer-message" placeholder="${
                  listing.listing_type === "commission"
                    ? "Describe the house you want built..."
                    : listing.listing_type === "looking_for"
                    ? "Let them know you have this house and what you'd want for it"
                    : "Anything you want the lister to know"
                }"></textarea>
                <div class="hero-ctas" style="justify-content:flex-start;margin-top:18px;">
                  <button class="btn btn-primary" id="submit-offer-btn">${listing.listing_type === "commission" ? "Send Request" : "Submit Offer"}</button>
                </div>
              </div>
            </div>`
          : ""
      }
    `;

    renderOffers(offers, isOwner, listing);

    content.querySelectorAll(".detail-tabs .tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        content.querySelectorAll(".detail-tabs .tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("tab-offers").hidden = tab.dataset.tab !== "offers";
        document.getElementById("tab-items").hidden = tab.dataset.tab !== "items";
      });
    });

    document.getElementById("scroll-to-offer-btn")?.addEventListener("click", () => {
      document.getElementById("offer-form-card")?.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    if (listing.status === "active" && !isOwner) {
      if (!myProfile) {
        document.getElementById("offer-builder").hidden = true;
        document.getElementById("need-profile-offer").hidden = false;
      } else {
        initOfferBuilder(listing);
      }
    }

    document.getElementById("report-link").addEventListener("click", (e) => {
      e.preventDefault();
      document.getElementById("report-form").hidden = false;
      e.target.hidden = true;
    });

    document.getElementById("report-submit").addEventListener("click", async () => {
      const reason = document.getElementById("report-reason").value;
      await api.report(listing.id, reason, "");
      document.getElementById("report-form").outerHTML = "<span class='hint'>Thanks — flagged for review.</span>";
    });
  }

  function renderOffers(offers, isOwner, listing) {
    const list = document.getElementById("tab-offers");
    if (!offers.length) {
      list.innerHTML = `<p class="hint">No offers yet.</p>`;
      return;
    }

    list.innerHTML = offers
      .map((offer) => {
        const canRespond = isOwner && listing.status === "active" && offer.status === "pending";
        const isCounterparty =
          myProfile && (myProfile.id === listing.profile_id || myProfile.id === offer.offering_profile_id);
        const showConfirm = offer.status === "accepted" && isCounterparty;

        return `
        <div class="offer-card">
          <div class="profile-chip">
            <img src="${offer.profiles?.rbx_avatar_url || "../images/brand/searchdog.png"}" alt="">
            <span class="name">${escapeHtml(offer.profiles?.display_name || "unknown")}${offer.profiles?.rbx_username ? ` <span style="font-weight:400;color:var(--muted);">(Roblox: ${escapeHtml(offer.profiles.rbx_username)})</span>` : ""}</span>
          </div>
          <div class="items-row">${itemsRowHtml(offer.items)}</div>
          ${offer.message ? `<p>${escapeHtml(offer.message)}</p>` : ""}
          <span class="status-badge ${offer.status === "accepted" ? "active" : "traded"}">${{ pending: "Pending", accepted: "Accepted", declined: "Declined", withdrawn: "Withdrawn" }[offer.status] || offer.status}</span>
          ${
            canRespond
              ? `<div class="offer-actions">
                  <button class="btn-sm accept" data-offer="${offer.id}" data-action="accept">Accept</button>
                  <button class="btn-sm decline" data-offer="${offer.id}" data-action="decline">Decline</button>
                </div>`
              : ""
          }
          ${showConfirm ? `<div class="trade-confirm" data-offer="${offer.id}"></div>` : ""}
          ${showConfirm ? `<div class="chat-container" data-chat-offer="${offer.id}"></div>` : ""}
        </div>`;
      })
      .join("");

    list.querySelectorAll("button[data-offer]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        try {
          await api.respondToOffer(btn.dataset.offer, btn.dataset.action);
          await loadListing();
        } catch (err) {
          alert(err.message);
        }
      });
    });

    list.querySelectorAll(".trade-confirm").forEach((el) => renderTradeConfirm(el, el.dataset.offer));
    list.querySelectorAll("[data-chat-offer]").forEach((el) => mountChatPanel(el, "offer", el.dataset.chatOffer));
  }

  async function renderTradeConfirm(el, offerId) {
    let trade;
    try {
      trade = await api.getTrade(offerId);
    } catch {
      trade = null;
    }

    if (trade?.status === "corroborated") {
      el.innerHTML = `<span class="verified-badge">Verified</span>`;
      return;
    }

    const myConfirmed = trade && myProfile && (
      (trade.lister_confirmed && trade.__isLister) || (trade.offerer_confirmed && !trade.__isLister)
    );

    el.innerHTML = `
      <div style="margin-top:10px;">
        ${
          myConfirmed
            ? `<p class="hint">You've confirmed this trade. Waiting on the other side.</p>`
            : `<button class="btn-sm accept" data-confirm="${offerId}">Confirm this trade happened</button>
               <p class="hint">Optional: attach a screenshot as proof — helps build a real trade-value history for the community.</p>`
        }
        <button class="btn-sm decline" data-cancel="${offerId}" style="margin-top:8px;">Cancel Trade</button>
      </div>`;

    const btn = el.querySelector("[data-confirm]");
    if (btn) {
      btn.addEventListener("click", async () => {
        try {
          await api.confirmTrade(offerId);
          await renderTradeConfirm(el, offerId);
        } catch (err) {
          alert(err.message);
        }
      });
    }

    el.querySelector("[data-cancel]").addEventListener("click", async () => {
      if (!confirm("Cancel this trade? The listing reopens and this offer is withdrawn.")) return;
      try {
        await api.cancelOffer(offerId);
        await loadListing();
      } catch (err) {
        alert(err.message);
      }
    });
  }

  function initOfferBuilder(listing) {
    const picker = mountItemPicker(document.getElementById("offer-builder"), "");

    const quickRepliesEl = document.getElementById("offer-quick-replies");
    const messageBox = document.getElementById("offer-message");
    quickRepliesEl.innerHTML = QUICK_REPLIES.map((phrase) => `<button type="button">${phrase}</button>`).join("");
    quickRepliesEl.querySelectorAll("button").forEach((btn) => {
      btn.addEventListener("click", () => {
        messageBox.value = messageBox.value ? `${messageBox.value} ${btn.textContent}` : btn.textContent;
        messageBox.focus();
      });
    });

    document.getElementById("submit-offer-btn").addEventListener("click", async () => {
      const errorBox = document.getElementById("offer-error");
      const successBox = document.getElementById("offer-success");
      errorBox.hidden = true;
      successBox.hidden = true;

      const selected = picker.getSelected();
      const message = document.getElementById("offer-message").value.trim();

      if (listing.listing_type === "house_trade" && !selected.length) {
        errorBox.textContent = "Add at least one item to your offer.";
        errorBox.hidden = false;
        return;
      }
      if (listing.listing_type !== "house_trade" && !selected.length && !message) {
        errorBox.textContent = "Add an item or a message.";
        errorBox.hidden = false;
        return;
      }

      try {
        await api.createOffer({ listing_id: listing.id, items: selected, message });
        successBox.textContent = "Offer sent!";
        successBox.hidden = false;
        await loadListing();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.hidden = false;
      }
    });
  }
</script>
</body>
</html>
