[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "22"

# Netlify Functions: profiles, listings, offers, photo uploads (see netlify/functions/)
[functions]
  directory = "netlify/functions"

# Cache static assets — images and data rarely change
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[redirects]]
  from = "/house/*"
  to = "/houses/:splat.html"
  status = 301

[[redirects]]
  from = "/admin/dashboard"
  to = "/admin/dashboard.html"
  status = 200

[[redirects]]
  from = "/admin/disputes"
  to = "/admin/dashboard.html"
  status = 301
