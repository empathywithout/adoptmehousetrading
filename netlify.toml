[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "22"

# Netlify Functions: profiles, listings, offers, photo uploads (see netlify/functions/)
[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/house/*"
  to = "/houses/:splat.html"
  status = 301

[[redirects]]
  from = "/admin/dashboard"
  to = "/admin/dashboard.html"
  status = 200

[[redirects]]
  from = "/admin/disputes"
  to = "/admin/dashboard.html"
  status = 301
