[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Netlify Functions: profiles, listings, offers, photo uploads (see netlify/functions/)
[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/house/*"
  to = "/houses/:splat.html"
  status = 301
